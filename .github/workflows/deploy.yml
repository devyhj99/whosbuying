name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: whosbuying-backend
  IMAGE_NAME_GATEWAY: whosbuying-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # 변경 경로 감지 필터 추가
      - name: Check for file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'
            backend:
              - 'backend/**'
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'

      - name: Set up QEMU
        if: steps.filter.outputs.gateway == 'true' || steps.filter.outputs.backend == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.filter.outputs.gateway == 'true' || steps.filter.outputs.backend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container Registry
        if: steps.filter.outputs.gateway == 'true' || steps.filter.outputs.backend == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase GitHub Actor for Image Name
        if: steps.filter.outputs.gateway == 'true' || steps.filter.outputs.backend == 'true'
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: ${{ github.repository_owner }}

      # 1. Go Gateway 이미지 빌드 및 푸시
      - name: Build and push Gateway image
        if: steps.filter.outputs.gateway == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME_GATEWAY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Spring Boot 백엔드 이미지 빌드 및 푸시
      - name: Build and push Backend image
        if: steps.filter.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    # 빌드된 항목이 있거나 컴포즈/워크플로우가 수정된 배포 필요 시에만 수행
    if: ${{ needs.build-and-push.outputs.gateway == 'true' || needs.build-and-push.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # 1. OCI 인스턴스에 docker-compose.yml 파일 전송
      - name: Copy docker-compose.yml via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "~/apps/whosbuying/"

      # 2. OCI 인스턴스에서 배포 스크립트 실행
      - name: Deploy to OCI Instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          script: |
            cd ~/apps/whosbuying
            
            # GitHub Packages (GHCR) 로그인
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            
            # 컨테이너 갱신 및 재기동
            docker compose pull
            docker compose up -d
            
            # 미사용 이미지 정리
            docker image prune -f
