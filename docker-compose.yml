services:
  postgres:
    image: postgres:18-alpine
    container_name: whosbuying-db
    restart: always
    environment:
      POSTGRES_DB: whosbuying
      POSTGRES_USER: ${POSTGRES_USER:-pgadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mewxi5-joMqew-ryxvuw}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8.0-M02-alpine
    container_name: whosbuying-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-vawmif-cixraw-3buBbe}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    image: ghcr.io/devyhj99/whosbuying-backend:latest
    container_name: whosbuying-backend
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    env_file:
      - .env

  gateway:
    image: ghcr.io/devyhj99/whosbuying-gateway:latest
    container_name: whosbuying-gateway
    restart: always
    depends_on:
      - redis
    ports:
      - "${GATEWAY_PORT:-8081}:${GATEWAY_PORT:-8081}"
    env_file:
      - .env

volumes:
  pgdata:
  redisdata:
